AllCops:
  NewCops: enable
Layout/MultilineMethodCallIndentation:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Naming/AsciiIdentifiers:
  Enabled: false
Style/Documentation:
  Enabled: false
Style/OneClassPerFile:
  Enabled: false
plugins:
  - rubocop-minitest
  - rubocop-rake
